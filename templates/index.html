<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
body{
    background-image: url("{{ url_for('static', filename='bg.jpg') }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
}
</style>
</head>
<body>

<h1>Student Login</h1>

<form action="/login" method="POST">

    <input type="text"
           name="roll"
           placeholder="Roll Number"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="/register">
    New Student? Register Here
</a>

<br><br>

<a href="/admin-login">
    Admin Login
</a>

</body>
</html>
